openapi: 3.0.3
info:
  title: Specialization API
  version: 1.0.0
  description: CRUD API for managing specializations
servers:
  - url: /

tags:
  - name: specialization
    description: Specialization management

paths:
  /specializations:
    get:
      tags: [ specialization ]
      operationId: getAllSpecializations
      summary: Get all specializations
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpecializationResponse"
    post:
      tags: [ specialization ]
      operationId: createSpecialization
      summary: Create a new specialization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpecializationRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecializationResponse"

  /specializations/{id}:
    get:
      tags: [ specialization ]
      operationId: getSpecializationById
      summary: Get specialization by id
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecializationResponse"
        "404":
          description: Not Found
    put:
      tags: [ specialization ]
      operationId: updateSpecialization
      summary: Update an existing specialization
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSpecializationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecializationResponse"
        "404":
          description: Not Found
    delete:
      tags: [ specialization ]
      operationId: deleteSpecialization
      summary: Delete a specialization by id
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    SpecializationResponse:
      type: object
      required: [ id, name, basePrice, weatherDependent ]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        basePrice:
          type: number
          format: double
        weatherDependent:
          type: boolean

    CreateSpecializationRequest:
      type: object
      required: [ name, basePrice ]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
        basePrice:
          type: number
          format: double
          minimum: 0.01
          maximum: 99999999.99
        weatherDependent:
          type: boolean

    UpdateSpecializationRequest:
      type: object
      required: [ name, basePrice ]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        description:
          type: string
          maxLength: 500
        basePrice:
          type: number
          format: double
          minimum: 0.01
          maximum: 99999999.99
        weatherDependent:
          type: boolean