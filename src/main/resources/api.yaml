openapi: 3.0.3
info:
  title: ДомБыт API
  version: 1.0.0
  description: API для специализаций и заказов
servers:
  - url: /

tags:
  - name: specialization
    description: Управление специализациями
  - name: order
    description: Управление заказами
  - name: ai
    description: AI рекомендации мастеров
  - name: validation
    description: Валидация данных при регистрации

paths:
  /api/specializations:
    get:
      tags: [ specialization ]
      operationId: getAllSpecializations
      summary: Получить все специализации
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpecializationResponse"
    post:
      tags: [ specialization ]
      operationId: createSpecialization
      summary: Создать специализацию (требуется ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpecializationRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecializationResponse"
        "403":
          description: Forbidden - требуется роль ADMIN

  /api/specializations/{id}:
    get:
      tags: [ specialization ]
      operationId: getSpecializationById
      summary: Получить специализацию по ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecializationResponse"
        "404":
          description: Not Found
    put:
      tags: [ specialization ]
      operationId: updateSpecialization
      summary: Обновить специализацию (требуется ADMIN)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSpecializationRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecializationResponse"
        "404":
          description: Not Found
    delete:
      tags: [ specialization ]
      operationId: deleteSpecialization
      summary: Удалить специализацию (требуется ADMIN)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  /api/orders:
    get:
      tags: [ order ]
      operationId: getOrders
      summary: Получить заказы текущего пользователя (как клиент)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
        "401":
          description: Unauthorized
    post:
      tags: [ order ]
      operationId: createOrder
      summary: Создать новый заказ (требуется CUSTOMER)
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized

  /api/orders/{id}:
    get:
      tags: [ order ]
      operationId: getOrderById
      summary: Получить заказ по ID
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Not Found
    put:
      tags: [ order ]
      operationId: updateOrder
      summary: Обновить заказ (только для клиента, пока статус NEW)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "403":
          description: Forbidden
        "404":
          description: Not Found
    delete:
      tags: [ order ]
      operationId: cancelOrder
      summary: Отменить заказ (только для клиента)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found

  /api/orders/{id}/status:
    patch:
      tags: [ order ]
      operationId: updateOrderStatus
      summary: Изменить статус заказа (для мастера)
      security:
        - cookieAuth: []
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStatusRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized
        "404":
          description: Not Found

  /api/orders/available:
    get:
      tags: [ order ]
      operationId: getAvailableOrders
      summary: Получить доступные заказы для мастера (по его специализациям)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
        "401":
          description: Unauthorized (требуется роль MASTER)

  /api/orders/ai-suggest:
    post:
      tags: [ ai ]
      operationId: aiSuggestMaster
      summary: AI подбор мастера по описанию проблемы
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiSuggestionRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiSuggestionResponse"
        "400":
          description: Bad Request
        "401":
          description: Unauthorized

  /api/validate/username:
    get:
      tags: [ validation ]
      operationId: checkUsername
      summary: Проверить, свободен ли username
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
          description: Проверяемый логин
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"

  /api/validate/email:
    get:
      tags: [ validation ]
      operationId: checkEmail
      summary: Проверить, свободен ли email
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
          description: Проверяемый email
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: Session cookie после входа через /login

  schemas:
    SpecializationResponse:
      type: object
      required: [ id, name, basePrice, weatherDependent ]
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Сантехник"
        description:
          type: string
          example: "Ремонт и установка сантехники"
        basePrice:
          type: number
          format: double
          example: 2500
        weatherDependent:
          type: boolean
          example: false

    CreateSpecializationRequest:
      type: object
      required: [ name, basePrice ]
      properties:
        name:
          type: string
          example: "Электрик"
        description:
          type: string
          example: "Ремонт проводки и электрооборудования"
        basePrice:
          type: number
          example: 3000
        weatherDependent:
          type: boolean
          example: false

    UpdateSpecializationRequest:
      type: object
      required: [ name, basePrice ]
      properties:
        name:
          type: string
        description:
          type: string
        basePrice:
          type: number
        weatherDependent:
          type: boolean

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        address:
          type: string
        status:
          type: string
          enum: [ NEW, ASSIGNED, IN_PROGRESS, COMPLETED, CANCELLED ]
        price:
          type: number
          format: double
        weatherCoefficient:
          type: number
          format: double
        scheduledDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        customerId:
          type: integer
          format: int64
        customerUsername:
          type: string
        masterId:
          type: integer
          format: int64
          nullable: true
        masterUsername:
          type: string
          nullable: true
        specializationId:
          type: integer
          format: int64
        specializationName:
          type: string

    CreateOrderRequest:
      type: object
      required: [ specializationId, title, address, scheduledDate ]
      properties:
        specializationId:
          type: integer
          format: int64
          example: 1
        targetMasterId:
          type: integer
          format: int64
          nullable: true
          description: "ID конкретного мастера (если есть предпочтение)"
        title:
          type: string
          example: "Починить кран"
        description:
          type: string
          example: "Капает вода из-под ручки"
        address:
          type: string
          example: "Казань, ул. Баумана, 10"
        scheduledDate:
          type: string
          format: date-time
          example: "2026-06-25T14:00:00"

    UpdateOrderRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        address:
          type: string

    UpdateStatusRequest:
      type: object
      required: [ status ]
      properties:
        status:
          type: string
          enum: [ ASSIGNED, IN_PROGRESS, COMPLETED, CANCELLED ]

    AiSuggestionRequest:
      type: object
      properties:
        issueDescription:
          type: string
          description: "Описание проблемы"
          example: "Капает вода из крана, течет унитаз"
        specializationId:
          type: integer
          format: int64
          nullable: true
          description: "ID специализации (опционально, если не указан - определится автоматически)"
        minRating:
          type: number
          format: double
          nullable: true
          description: "Минимальный рейтинг мастера"
          example: 4.5

    AiSuggestionResponse:
      type: object
      properties:
        prompt:
          type: string
          description: "Сформированный промпт для AI"
        recommendedMasters:
          type: array
          items:
            type: string
          description: "Список рекомендованных мастеров"
        specialization:
          type: string
          description: "Определённая специализация"

    ValidationResponse:
      type: object
      properties:
        exists:
          type: boolean
          description: "true - имя занято, false - свободно"