spring:
  freemarker:
    template-loader-path: classpath:/templates/
    suffix: .ftl
    charset: UTF-8
    check-template-location: true
    expose-request-attributes: true
    expose-session-attributes: true
    request-context-attribute: request

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:household}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    root: INFO
    kfu.itis: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.flywaydb: DEBUG

app:
  yandex:
    maps-api-key: ${YANDEX_MAPS_API_KEY:}
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    upload-preset: ${CLOUDINARY_UPLOAD_PRESET:}
  external-api:
    weather-url: ${WEATHER_API_URL:https://api.open-meteo.com/v1/forecast?latitude=55.7887&longitude=49.1221&current=temperature_2m,weather_code,wind_speed_10m}
    currency-url: ${CURRENCY_API_URL:https://www.cbr-xml-daily.ru/daily_json.js}
    weather-timeout: 5000
    currency-timeout: 5000

server:
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: false
        same-site: lax
  error:
    path: /error
    whitelabel:
      enabled: false

admin:
  username: ${ADMIN_USERNAME:admin}
  email: ${ADMIN_EMAIL:admin@household.ru}
  password: ${ADMIN_PASSWORD:admin123}
  first-name: ${ADMIN_FIRST_NAME:Админ}
  last-name: ${ADMIN_LAST_NAME:Системный}
  phone: ${ADMIN_PHONE:+70000000001}