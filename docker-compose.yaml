version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: household-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file:
      .env

  redis:
    image: redis:7-alpine
    container_name: household-redis
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  pgdata: